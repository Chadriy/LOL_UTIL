<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英雄联盟5V5英雄随机器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 18% 8%, rgba(37, 99, 235, .35), transparent 32%),
        radial-gradient(circle at 82% 12%, rgba(220, 38, 38, .30), transparent 30%),
        radial-gradient(circle at 50% 110%, rgba(202, 138, 4, .16), transparent 38%),
        #020617;
    }
    .glass {
      background: rgba(15, 23, 42, .72);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .35);
    }
    .hero-card {
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .hero-card:hover {
      transform: translateY(-3px);
      border-color: rgba(234, 179, 8, .65);
      box-shadow: 0 12px 28px rgba(0, 0, 0, .35), 0 0 22px rgba(234, 179, 8, .10);
      background: rgba(15, 23, 42, .92);
    }
    .gold-text {
      background: linear-gradient(90deg, #fde68a, #f59e0b, #fef3c7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .lane-title::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #facc15;
      box-shadow: 0 0 18px rgba(250, 204, 21, .8);
    }
  </style>
</head>
<body class="min-h-screen text-slate-100 selection:bg-amber-400 selection:text-slate-950">
  <div class="max-w-7xl mx-auto px-4 py-8 md:py-10">
    <header class="mb-7 text-center relative">
      <div class="inline-flex items-center gap-2 rounded-full border border-amber-300/25 bg-amber-300/10 px-4 py-1.5 text-xs text-amber-100 shadow-lg shadow-amber-950/20">
        <span class="h-2 w-2 rounded-full bg-emerald-400 shadow-[0_0_14px_rgba(52,211,153,.9)]"></span>
        单 HTML · 国内头像源 · 双方英雄不重复 · 使用英雄称号
      </div>
      <h1 class="mt-4 text-4xl md:text-6xl font-black tracking-tight gold-text">英雄联盟5V5英雄随机器</h1>
      <p class="mt-3 text-slate-300">按分路随机英雄，卡片优先展示英雄称号，蓝色方与红色方不会出现相同英雄。</p>
      <p class="mt-2 text-xs text-slate-500 max-w-3xl mx-auto leading-relaxed">
        英雄池为内置近似 OPGG 全球分路常见英雄池；头像优先使用腾讯 LOL 国内资源，加载失败时自动切换 Riot Data Dragon 备用源。
      </p>
    </header>

    <section class="mb-7 rounded-3xl border border-white/10 glass p-4 md:p-5">
      <div class="flex flex-col lg:flex-row lg:items-center gap-4 justify-between">
        <div class="flex flex-col sm:flex-row gap-4 sm:items-end">
          <div>
            <label for="count" class="block text-sm font-semibold text-slate-200 mb-2">每个分路随机数量 n</label>
            <div class="flex items-center rounded-2xl border border-white/10 bg-slate-950/70 p-1.5 focus-within:ring-2 focus-within:ring-amber-400/60">
              <button id="minusBtn" class="h-10 w-10 rounded-xl bg-slate-800 hover:bg-slate-700 font-black transition" type="button">−</button>
              <input id="count" type="number" min="1" max="20" value="3" class="w-20 bg-transparent px-3 py-2 text-center text-lg font-black text-white outline-none" />
              <button id="plusBtn" class="h-10 w-10 rounded-xl bg-slate-800 hover:bg-slate-700 font-black transition" type="button">+</button>
            </div>
          </div>
          <div class="text-xs text-slate-400 leading-relaxed pb-1">
            <div>建议 n ≤ 5，头像加载更快。</div>
            <div>当前最大限制为 20。</div>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3">
          <button id="randomBtn" class="rounded-2xl bg-gradient-to-r from-amber-300 via-yellow-400 to-amber-500 hover:from-amber-200 hover:to-yellow-300 text-slate-950 font-black px-7 py-3 transition shadow-lg shadow-amber-950/30 active:scale-95">
            开始随机
          </button>
          <button id="clearBtn" class="rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 text-slate-100 font-bold px-6 py-3 transition active:scale-95">
            清空结果
          </button>
        </div>
      </div>
    </section>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <section class="rounded-[2rem] border border-blue-300/25 bg-blue-950/25 overflow-hidden shadow-2xl shadow-blue-950/30">
        <div class="px-5 py-4 bg-gradient-to-r from-blue-600/45 via-blue-500/20 to-transparent border-b border-blue-300/20 flex items-center justify-between">
          <div>
            <h2 class="text-2xl md:text-3xl font-black">蓝色方</h2>
            <p class="text-xs text-blue-100/70 mt-1">Blue Side</p>
          </div>
          <div class="h-11 w-11 rounded-2xl bg-blue-400/20 border border-blue-200/20 grid place-items-center text-blue-100 font-black">B</div>
        </div>
        <div id="blueTeam" class="p-4 space-y-4"></div>
      </section>

      <section class="rounded-[2rem] border border-red-300/25 bg-red-950/25 overflow-hidden shadow-2xl shadow-red-950/30">
        <div class="px-5 py-4 bg-gradient-to-r from-red-600/45 via-red-500/20 to-transparent border-b border-red-300/20 flex items-center justify-between">
          <div>
            <h2 class="text-2xl md:text-3xl font-black">红色方</h2>
            <p class="text-xs text-red-100/70 mt-1">Red Side</p>
          </div>
          <div class="h-11 w-11 rounded-2xl bg-red-400/20 border border-red-200/20 grid place-items-center text-red-100 font-black">R</div>
        </div>
        <div id="redTeam" class="p-4 space-y-4"></div>
      </section>
    </main>

    <footer class="mt-7 text-center text-xs text-slate-500">
      页面数据为静态内置英雄池；如需更新英雄池，可直接修改 HTML 中的 pools 与 championTitles 数据。
    </footer>
  </div>

  <script>
    const VERSION = "14.24.1";
    const FALLBACK_VERSION = "14.23.1";

    const lanes = [
      { key: "top", name: "上路", icon: "TOP" },
      { key: "jungle", name: "打野", icon: "JUG" },
      { key: "mid", name: "中路", icon: "MID" },
      { key: "adc", name: "下路", icon: "ADC" },
      { key: "support", name: "辅助", icon: "SUP" }
    ];

    const championTitles = {
      Aatrox: "暗裔剑魔", Ahri: "九尾妖狐", Akali: "离群之刺", Akshan: "影哨", Alistar: "牛头酋长", Ambessa: "铁血狼母", Amumu: "殇之木乃伊", Anivia: "冰晶凤凰", Annie: "黑暗之女", Aphelios: "残月之肃", Ashe: "寒冰射手", AurelionSol: "铸星龙王", Aurora: "双界灵兔", Azir: "沙漠皇帝", Bard: "星界游神", Belveth: "虚空女皇", Blitzcrank: "蒸汽机器人", Brand: "复仇焰魂", Braum: "弗雷尔卓德之心", Briar: "狂厄蔷薇", Caitlyn: "皮城女警", Camille: "青钢影", Cassiopeia: "魔蛇之拥", Chogath: "虚空恐惧", Corki: "英勇投弹手", Darius: "诺克萨斯之手", Diana: "皎月女神", Draven: "荣耀行刑官", DrMundo: "祖安狂人", Ekko: "时间刺客", Elise: "蜘蛛女皇", Evelynn: "痛苦之拥", Ezreal: "探险家", Fiddlesticks: "远古恐惧", Fiora: "无双剑姬", Fizz: "潮汐海灵", Galio: "正义巨像", Gangplank: "海洋之灾", Garen: "德玛西亚之力", Gnar: "迷失之牙", Gragas: "酒桶", Graves: "法外狂徒", Gwen: "灵罗娃娃", Hecarim: "战争之影", Heimerdinger: "大发明家", Hwei: "异画师", Illaoi: "海兽祭司", Irelia: "刀锋舞者", Ivern: "翠神", Janna: "风暴之怒", JarvanIV: "德玛西亚皇子", Jax: "武器大师", Jayce: "未来守护者", Jhin: "戏命师", Jinx: "暴走萝莉", Kaisa: "虚空之女", Kalista: "复仇之矛", Karma: "天启者", Karthus: "死亡颂唱者", Kassadin: "虚空行者", Katarina: "不祥之刃", Kayle: "正义天使", Kayn: "影流之镰", Kennen: "狂暴之心", Khazix: "虚空掠夺者", Kindred: "永猎双子", Kled: "暴怒骑士", KogMaw: "深渊巨口", KSante: "纳祖芒荣耀", Leblanc: "诡术妖姬", LeeSin: "盲僧", Leona: "曙光女神", Lillia: "含羞蓓蕾", Lissandra: "冰霜女巫", Lucian: "圣枪游侠", Lulu: "仙灵女巫", Lux: "光辉女郎", Malphite: "熔岩巨兽", Malzahar: "虚空先知", Maokai: "扭曲树精", MasterYi: "无极剑圣", Milio: "明烛", MissFortune: "赏金猎人", MonkeyKing: "齐天大圣", Mordekaiser: "铁铠冥魂", Morgana: "堕落天使", Naafiri: "百裂冥犬", Nami: "唤潮鲛姬", Nasus: "沙漠死神", Nautilus: "深海泰坦", Neeko: "万花通灵", Nidalee: "狂野女猎手", Nilah: "不羁之悦", Nocturne: "永恒梦魇", Nunu: "雪原双子", Olaf: "狂战士", Orianna: "发条魔灵", Ornn: "山隐之焰", Pantheon: "不屈之枪", Poppy: "圣锤之毅", Pyke: "血港鬼影", Qiyana: "元素女皇", Quinn: "德玛西亚之翼", Rakan: "幻翎", Rammus: "披甲龙龟", RekSai: "虚空遁地兽", Rell: "镕铁少女", Renata: "炼金男爵", Renekton: "荒漠屠夫", Rengar: "傲之追猎者", Riven: "放逐之刃", Rumble: "机械公敌", Ryze: "符文法师", Samira: "沙漠玫瑰", Sejuani: "北地之怒", Senna: "涤魂圣枪", Seraphine: "星籁歌姬", Sett: "腕豪", Shaco: "恶魔小丑", Shen: "暮光之眼", Shyvana: "龙血武姬", Singed: "炼金术士", Sion: "亡灵战神", Sivir: "战争女神", Skarner: "远古巫灵", Smolder: "炽炎雏龙", Sona: "琴瑟仙女", Soraka: "众星之子", Swain: "诺克萨斯统领", Sylas: "解脱者", Syndra: "暗黑元首", TahmKench: "河流之王", Taliyah: "岩雀", Talon: "刀锋之影", Taric: "瓦洛兰之盾", Teemo: "迅捷斥候", Thresh: "魂锁典狱长", Tristana: "麦林炮手", Trundle: "巨魔之王", Tryndamere: "蛮族之王", TwistedFate: "卡牌大师", Twitch: "瘟疫之源", Udyr: "兽灵行者", Urgot: "无畏战车", Varus: "惩戒之箭", Vayne: "暗夜猎手", Veigar: "邪恶小法师", Velkoz: "虚空之眼", Vex: "愁云使者", Vi: "皮城执法官", Viego: "破败之王", Viktor: "机械先驱", Vladimir: "猩红收割者", Volibear: "不灭狂雷", Warwick: "祖安怒兽", Xayah: "逆羽", Xerath: "远古巫灵", XinZhao: "德邦总管", Yasuo: "疾风剑豪", Yone: "封魔剑魂", Yorick: "牧魂人", Yuumi: "魔法猫咪", Zac: "生化魔人", Zed: "影流之主", Zeri: "祖安花火", Ziggs: "爆破鬼才", Zilean: "时光守护者", Zoe: "暮光星灵", Zyra: "荆棘之兴"
    };

    const pools = {
      top: ["Aatrox","Ambessa","Aurora","Camille","Chogath","Darius","DrMundo","Fiora","Gangplank","Garen","Gnar","Gragas","Gwen","Illaoi","Irelia","Jax","Jayce","Kayle","Kennen","Kled","KSante","Malphite","Mordekaiser","Nasus","Ornn","Pantheon","Poppy","Quinn","Renekton","Riven","Rumble","Sett","Shen","Singed","Sion","TahmKench","Teemo","Trundle","Tryndamere","Urgot","Vayne","Volibear","Yasuo","Yone","Yorick"],
      jungle: ["Amumu","Belveth","Brand","Briar","Diana","Ekko","Elise","Evelynn","Fiddlesticks","Gragas","Graves","Hecarim","Ivern","JarvanIV","Karthus","Kayn","Khazix","Kindred","LeeSin","Lillia","Maokai","MasterYi","MonkeyKing","Nidalee","Nocturne","Nunu","Olaf","Poppy","Rammus","RekSai","Rengar","Sejuani","Shaco","Shyvana","Skarner","Taliyah","Talon","Trundle","Udyr","Vi","Viego","Volibear","Warwick","XinZhao","Zac"],
      mid: ["Ahri","Akali","Akshan","Anivia","Annie","AurelionSol","Aurora","Azir","Cassiopeia","Corki","Diana","Ekko","Fizz","Galio","Hwei","Irelia","Kassadin","Katarina","Leblanc","Lissandra","Lux","Malzahar","Naafiri","Neeko","Orianna","Qiyana","Ryze","Swain","Sylas","Syndra","Taliyah","Talon","Tristana","TwistedFate","Veigar","Velkoz","Vex","Viktor","Vladimir","Xerath","Yasuo","Yone","Zed","Ziggs","Zoe"],
      adc: ["Aphelios","Ashe","Caitlyn","Draven","Ezreal","Jhin","Jinx","Kaisa","Kalista","KogMaw","Lucian","MissFortune","Nilah","Samira","Senna","Seraphine","Sivir","Smolder","Tristana","Twitch","Varus","Vayne","Xayah","Yasuo","Zeri","Ziggs"],
      support: ["Alistar","Amumu","Bard","Blitzcrank","Brand","Braum","Janna","Karma","Leona","Lulu","Lux","Maokai","Milio","Morgana","Nami","Nautilus","Neeko","Pantheon","Poppy","Pyke","Rakan","Rell","Renata","Senna","Seraphine","Sona","Soraka","Swain","TahmKench","Taric","Thresh","Velkoz","Xerath","Yuumi","Zilean","Zyra"]
    };

    const $ = id => document.getElementById(id);
    const safeTitle = id => championTitles[id] || id;

    function iconUrl(id) {
      return `https://game.gtimg.cn/images/lol/act/img/champion/${id}.png`;
    }

    function fallbackIconUrl(id) {
      return `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/champion/${id}.png`;
    }

    function secondFallbackIconUrl(id) {
      return `https://ddragon.leagueoflegends.com/cdn/${FALLBACK_VERSION}/img/champion/${id}.png`;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickUnique(pool, count, used) {
      const available = shuffle(pool.filter(id => !used.has(id)));
      const picked = available.slice(0, count);
      picked.forEach(id => used.add(id));
      return picked;
    }

    function card(id) {
      const title = safeTitle(id);
      return `
        <div class="hero-card group flex items-center gap-3 rounded-2xl bg-slate-950/65 border border-white/10 p-2.5 overflow-hidden">
          <div class="relative shrink-0">
            <img src="${iconUrl(id)}" alt="${title}" class="w-14 h-14 rounded-2xl object-cover border border-amber-200/20 shadow-lg shadow-black/30" loading="lazy" onerror="if (!this.dataset.fallback) { this.dataset.fallback='1'; this.src='${fallbackIconUrl(id)}'; } else { this.onerror=null; this.src='${secondFallbackIconUrl(id)}'; }" />
            <div class="absolute -inset-0.5 rounded-2xl border border-white/10 pointer-events-none"></div>
          </div>
          <div class="min-w-0 flex-1">
            <div class="font-black text-sm md:text-base truncate text-slate-50 group-hover:text-amber-100 transition">${title}</div>
            <div class="text-xs text-slate-500 truncate">${id}</div>
          </div>
        </div>`;
    }

    function laneBlock(lane, picks) {
      return `
        <div class="rounded-3xl border border-white/10 bg-slate-950/40 overflow-hidden">
          <div class="px-4 py-3 border-b border-white/10 flex items-center justify-between bg-white/[0.03]">
            <h3 class="lane-title flex items-center gap-2 font-black text-lg">${lane.name}</h3>
            <span class="rounded-full border border-amber-300/20 bg-amber-300/10 px-3 py-1 text-xs text-amber-100">${lane.icon} · ${picks.length} 个</span>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3 p-3">
            ${picks.map(card).join("")}
          </div>
        </div>`;
    }

    function randomize() {
      const n = Math.max(1, Math.min(20, Number($("count").value) || 3));
      $("count").value = n;

      const used = new Set();
      const blue = {};
      const red = {};

      for (const lane of lanes) blue[lane.key] = pickUnique(pools[lane.key], n, used);
      for (const lane of lanes) red[lane.key] = pickUnique(pools[lane.key], n, used);

      $("blueTeam").innerHTML = lanes.map(lane => laneBlock(lane, blue[lane.key])).join("");
      $("redTeam").innerHTML = lanes.map(lane => laneBlock(lane, red[lane.key])).join("");
    }

    function clearResults() {
      $("blueTeam").innerHTML = `<div class="rounded-3xl border border-dashed border-blue-200/20 bg-blue-950/20 text-blue-100/60 text-center py-16">点击“开始随机”生成蓝色方结果</div>`;
      $("redTeam").innerHTML = `<div class="rounded-3xl border border-dashed border-red-200/20 bg-red-950/20 text-red-100/60 text-center py-16">点击“开始随机”生成红色方结果</div>`;
    }

    function clampCount(delta) {
      const input = $("count");
      input.value = Math.max(1, Math.min(20, (Number(input.value) || 3) + delta));
    }

    $("randomBtn").addEventListener("click", randomize);
    $("clearBtn").addEventListener("click", clearResults);
    $("minusBtn").addEventListener("click", () => clampCount(-1));
    $("plusBtn").addEventListener("click", () => clampCount(1));

    clearResults();
  </script>
</body>
</html>
