<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5V5 分组随机（杯赛平衡版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 14% 8%, rgba(16, 185, 129, .22), transparent 32%),
        radial-gradient(circle at 86% 10%, rgba(245, 158, 11, .22), transparent 28%),
        radial-gradient(circle at 50% 120%, rgba(59, 130, 246, .18), transparent 38%),
        #030712;
    }
    .glass { background: rgba(15, 23, 42, .72); backdrop-filter: blur(16px); box-shadow: 0 18px 60px rgba(0, 0, 0, .38); }
    .team-card { transition: transform .18s ease, box-shadow .18s ease; }
    .team-card:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(0, 0, 0, .28); }
  </style>
</head>
<body class="min-h-screen text-slate-100 selection:bg-emerald-300 selection:text-slate-950">
  <div class="max-w-7xl mx-auto px-4 py-8 md:py-10">
    <header class="mb-7 text-center">
      <div class="inline-flex items-center gap-2 rounded-full border border-emerald-300/35 bg-emerald-300/10 px-4 py-1.5 text-xs text-emerald-100">
        <span class="h-2 w-2 rounded-full bg-amber-300"></span>
        固定双方队长 · 全员随机分边 · 全员随机分路 · 战力尽量平衡
      </div>
      <h1 class="mt-4 text-4xl md:text-6xl font-black tracking-tight bg-gradient-to-r from-emerald-200 via-cyan-200 to-amber-100 text-transparent bg-clip-text">5V5 分组随机（杯赛平衡版）</h1>
      <p class="mt-3 text-slate-300">支持从飞升杯/神将杯选手池勾选加入名单，随机分组时会尽量降低双方总战力差。</p>
      <a href="group_random.html" class="mt-4 inline-flex rounded-full border border-white/15 bg-white/5 px-4 py-2 text-sm font-semibold text-slate-200 hover:bg-white/10 transition">返回基础分组页面</a>
    </header>

    <section class="glass rounded-3xl border border-white/10 p-4 md:p-5 mb-6">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div>
          <label for="playersInput" class="block text-sm font-semibold text-slate-200 mb-2">玩家名单（每行一个，或用空格/逗号分隔）</label>
          <textarea id="playersInput" rows="11" class="w-full rounded-2xl border border-white/10 bg-slate-950/70 p-3 outline-none focus:ring-2 focus:ring-emerald-300/60" placeholder="示例：
玩家1
玩家2
玩家3
..."></textarea>
          <p class="mt-2 text-xs text-slate-400">建议 10 人。必须是偶数人数，才能平均分边。</p>
          <p id="helperText" class="mt-2 text-xs text-emerald-200/90"></p>
        </div>

        <div class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label for="blueCaptain" class="block text-sm font-semibold text-slate-200 mb-2">蓝色方队长</label>
              <select id="blueCaptain" class="w-full rounded-2xl border border-blue-300/25 bg-blue-950/30 p-3 outline-none focus:ring-2 focus:ring-blue-300/60"></select>
            </div>
            <div>
              <label for="redCaptain" class="block text-sm font-semibold text-slate-200 mb-2">红色方队长</label>
              <select id="redCaptain" class="w-full rounded-2xl border border-red-300/25 bg-red-950/30 p-3 outline-none focus:ring-2 focus:ring-red-300/60"></select>
            </div>
          </div>

          <div class="flex flex-wrap gap-3">
            <button id="refreshBtn" class="rounded-2xl border border-white/15 bg-white/5 hover:bg-white/10 px-5 py-3 font-bold transition">刷新队长列表</button>
            <button id="randomGroupBtn" class="rounded-2xl bg-gradient-to-r from-emerald-300 via-cyan-300 to-amber-200 text-slate-950 font-black px-6 py-3 hover:brightness-110 transition">开始分组随机</button>
            <button id="clearBtn" class="rounded-2xl border border-white/15 bg-white/5 hover:bg-white/10 px-5 py-3 font-bold transition">清空结果</button>
          </div>

          <div id="errorText" class="hidden rounded-2xl border border-rose-300/30 bg-rose-900/25 px-4 py-3 text-rose-100 text-sm"></div>
        </div>
      </div>
    </section>

    <section class="glass rounded-3xl border border-white/10 p-4 md:p-5 mb-6">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h2 class="text-xl md:text-2xl font-black">杯赛选手池</h2>
          <p class="text-xs text-slate-300 mt-1">飞升杯选手默认战力更高，神将杯选手战力略低，普通玩家为中等。</p>
        </div>
        <div class="flex flex-wrap gap-3">
          <button id="addSelectedBtn" class="rounded-2xl border border-emerald-300/35 bg-emerald-300/10 hover:bg-emerald-300/20 px-4 py-2 text-sm font-bold text-emerald-100 transition">将勾选选手加入名单</button>
          <button id="clearSelectedBtn" class="rounded-2xl border border-white/15 bg-white/5 hover:bg-white/10 px-4 py-2 text-sm font-bold transition">清空勾选</button>
        </div>
      </div>

      <div class="mt-4 grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div class="rounded-2xl border border-amber-300/25 bg-amber-950/15 p-4">
          <div class="flex items-center justify-between gap-3">
            <div>
              <h3 class="text-lg font-black text-amber-100">飞升杯选手</h3>
              <p class="text-xs text-amber-100/75">参考战力：3 星</p>
            </div>
            <span class="rounded-full border border-amber-300/25 bg-amber-400/10 px-2.5 py-1 text-xs font-bold text-amber-100">高强度</span>
          </div>
          <div id="ascendPool" class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
        </div>

        <div class="rounded-2xl border border-cyan-300/25 bg-cyan-950/15 p-4">
          <div class="flex items-center justify-between gap-3">
            <div>
              <h3 class="text-lg font-black text-cyan-100">神将杯选手</h3>
              <p class="text-xs text-cyan-100/75">参考战力：1 星</p>
            </div>
            <span class="rounded-full border border-cyan-300/25 bg-cyan-400/10 px-2.5 py-1 text-xs font-bold text-cyan-100">可塑性</span>
          </div>
          <div id="generalPool" class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
        </div>
      </div>

      <p id="selectedCount" class="mt-4 text-xs text-slate-300">当前已勾选 0 人</p>
    </section>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <section class="team-card rounded-[2rem] border border-blue-300/25 bg-blue-950/25 overflow-hidden shadow-2xl shadow-blue-950/30">
        <div class="px-5 py-4 bg-gradient-to-r from-blue-600/45 via-blue-500/20 to-transparent border-b border-blue-300/20 flex items-center justify-between">
          <div>
            <h2 class="text-2xl md:text-3xl font-black">蓝色方</h2>
            <p id="blueMeta" class="text-xs text-blue-100/70 mt-1">Blue Side</p>
          </div>
          <div class="h-11 w-11 rounded-2xl bg-blue-400/20 border border-blue-200/20 grid place-items-center text-blue-100 font-black">B</div>
        </div>
        <div id="blueTeam" class="p-4"></div>
      </section>

      <section class="team-card rounded-[2rem] border border-red-300/25 bg-red-950/25 overflow-hidden shadow-2xl shadow-red-950/30">
        <div class="px-5 py-4 bg-gradient-to-r from-red-600/45 via-red-500/20 to-transparent border-b border-red-300/20 flex items-center justify-between">
          <div>
            <h2 class="text-2xl md:text-3xl font-black">红色方</h2>
            <p id="redMeta" class="text-xs text-red-100/70 mt-1">Red Side</p>
          </div>
          <div class="h-11 w-11 rounded-2xl bg-red-400/20 border border-red-200/20 grid place-items-center text-red-100 font-black">R</div>
        </div>
        <div id="redTeam" class="p-4"></div>
      </section>
    </main>

    <div id="balanceHint" class="mt-5 rounded-2xl border border-white/10 bg-slate-900/45 px-4 py-3 text-sm text-slate-200">等待分组...</div>
  </div>

  <script>
    const lanes = ["上路", "打野", "中路", "下路", "辅助"];
    const $ = id => document.getElementById(id);

    const presetPlayers = {
      ascend: ["清风哥", "沫涵", "龙弟", "指挥", "心动", "大飞", "鱼丸", "掉线", "屏蔽", "帮忙", "李哥", "何总", "帮忙哥", "O神"],
      general: ["天道超", "巍哥", "冲哥", "DQ文", "兰子", "灰机", "泽丽", "刚子", "老陆", "虾哥", "磊子", "三火", "天亮", "边总", "F姐", "H7", "L7"]
    };

    const tierScore = {
      ascend: 3,
      normal: 2,
      general: 1
    };

    const playerTierMap = new Map();
    for (const name of presetPlayers.ascend) {
      playerTierMap.set(name, "ascend");
    }
    for (const name of presetPlayers.general) {
      playerTierMap.set(name, "general");
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getPlayerTier(name) {
      return playerTierMap.get(name) || "normal";
    }

    function getPlayerPower(name) {
      return tierScore[getPlayerTier(name)] || tierScore.normal;
    }

    function getTierMeta(name) {
      const tier = getPlayerTier(name);
      if (tier === "ascend") {
        return { label: "飞升杯", tone: "border-amber-300/30 bg-amber-300/15 text-amber-100" };
      }
      if (tier === "general") {
        return { label: "神将杯", tone: "border-cyan-300/30 bg-cyan-300/10 text-cyan-100" };
      }
      return { label: "普通", tone: "border-slate-300/25 bg-slate-300/10 text-slate-200" };
    }

    function parsePlayers() {
      const raw = $("playersInput").value || "";
      const parts = raw
        .split(/[\n,，、\t ]+/)
        .map(x => x.trim())
        .filter(Boolean);

      const unique = [];
      const seen = new Set();
      for (const p of parts) {
        if (!seen.has(p)) {
          seen.add(p);
          unique.push(p);
        }
      }
      return unique;
    }

    function setError(text) {
      const box = $("errorText");
      if (!text) {
        box.classList.add("hidden");
        box.textContent = "";
        return;
      }
      box.classList.remove("hidden");
      box.textContent = text;
    }

    function setHelper(text) {
      $("helperText").textContent = text || "";
    }

    function fillCaptainOptions() {
      const players = parsePlayers();
      const blueSelect = $("blueCaptain");
      const redSelect = $("redCaptain");

      const prevBlue = blueSelect.value;
      const prevRed = redSelect.value;

      blueSelect.innerHTML = "";
      redSelect.innerHTML = "";

      if (!players.length) {
        blueSelect.innerHTML = '<option value="">请先输入玩家</option>';
        redSelect.innerHTML = '<option value="">请先输入玩家</option>';
        return;
      }

      for (const p of players) {
        blueSelect.add(new Option(p, p));
        redSelect.add(new Option(p, p));
      }

      blueSelect.value = players.includes(prevBlue) ? prevBlue : players[0];
      redSelect.value = players.includes(prevRed)
        ? prevRed
        : (players[1] || players[0]);
    }

    function laneByIndex(index) {
      const lane = lanes[index % lanes.length];
      const round = Math.floor(index / lanes.length);
      return round === 0 ? lane : `${lane}${round + 1}`;
    }

    function assignTeamLanes(teamNames) {
      const laneOrder = shuffle(Array.from({ length: teamNames.length }, (_, i) => laneByIndex(i)));
      return teamNames.map((name, i) => ({ name, lane: laneOrder[i] }));
    }

    function calcTeamPower(teamNames) {
      return teamNames.reduce((sum, name) => sum + getPlayerPower(name), 0);
    }

    function buildBalancedTeams(blueCaptain, redCaptain, rest, teamSize) {
      const maxRounds = Math.max(240, Math.min(1800, rest.length * 220));
      let best = null;

      for (let round = 0; round < maxRounds; round++) {
        const ordered = shuffle(rest).sort((a, b) => {
          const delta = getPlayerPower(b) - getPlayerPower(a);
          if (delta !== 0) return delta;
          return Math.random() - 0.5;
        });

        const blueNames = [blueCaptain];
        const redNames = [redCaptain];
        let bluePower = getPlayerPower(blueCaptain);
        let redPower = getPlayerPower(redCaptain);

        for (const name of ordered) {
          const power = getPlayerPower(name);

          if (blueNames.length >= teamSize) {
            redNames.push(name);
            redPower += power;
            continue;
          }
          if (redNames.length >= teamSize) {
            blueNames.push(name);
            bluePower += power;
            continue;
          }

          if (bluePower === redPower) {
            if (Math.random() < 0.5) {
              blueNames.push(name);
              bluePower += power;
            } else {
              redNames.push(name);
              redPower += power;
            }
            continue;
          }

          if (bluePower < redPower) {
            blueNames.push(name);
            bluePower += power;
          } else {
            redNames.push(name);
            redPower += power;
          }
        }

        const diff = Math.abs(bluePower - redPower);
        if (!best || diff < best.diff || (diff === best.diff && Math.random() < 0.35)) {
          best = {
            blueNames,
            redNames,
            bluePower,
            redPower,
            diff
          };
        }

        if (best && best.diff === 0) {
          break;
        }
      }

      return best;
    }

    function renderTeam(teamData, captainName, side) {
      const captainTone = side === "blue"
        ? "border-blue-200/20 bg-blue-950/25 text-blue-100"
        : "border-red-200/20 bg-red-950/25 text-red-100";

      return `
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          ${teamData.map(player => {
            const tier = getTierMeta(player.name);
            return `
              <div class="rounded-2xl border border-white/10 bg-slate-950/55 p-3">
                <div class="flex items-center justify-between gap-3">
                  <div class="min-w-0">
                    <div class="font-black text-base truncate">${escapeHtml(player.name)}</div>
                    <div class="text-xs text-slate-300 mt-1">分路：<span class="font-semibold text-amber-100">${escapeHtml(player.lane)}</span></div>
                    <div class="mt-2 inline-flex items-center gap-2">
                      <span class="rounded-full border px-2 py-0.5 text-[11px] font-bold ${tier.tone}">${tier.label}</span>
                      <span class="text-[11px] text-slate-300">战力 ${getPlayerPower(player.name)}</span>
                    </div>
                  </div>
                  <div class="flex flex-col gap-2 items-end">
                    ${player.name === captainName
                      ? `<span class="shrink-0 rounded-full border px-2.5 py-1 text-xs font-bold ${captainTone}">队长</span>`
                      : ""}
                  </div>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function setBalanceHint(diff) {
      const box = $("balanceHint");
      if (typeof diff !== "number") {
        box.className = "mt-5 rounded-2xl border border-white/10 bg-slate-900/45 px-4 py-3 text-sm text-slate-200";
        box.textContent = "等待分组...";
        return;
      }

      if (diff <= 1) {
        box.className = "mt-5 rounded-2xl border border-emerald-300/30 bg-emerald-900/25 px-4 py-3 text-sm text-emerald-100";
        box.textContent = `双方总战力差：${diff}（平衡度很高）`;
        return;
      }

      if (diff <= 3) {
        box.className = "mt-5 rounded-2xl border border-amber-300/35 bg-amber-900/25 px-4 py-3 text-sm text-amber-100";
        box.textContent = `双方总战力差：${diff}（可接受）`;
        return;
      }

      box.className = "mt-5 rounded-2xl border border-rose-300/35 bg-rose-900/25 px-4 py-3 text-sm text-rose-100";
      box.textContent = `双方总战力差：${diff}（差距偏大，可再次随机）`;
    }

    function randomGroup() {
      setError("");
      setHelper("");

      const players = parsePlayers();
      if (players.length < 2) {
        setError("请至少输入 2 位玩家。");
        return;
      }
      if (players.length % 2 !== 0) {
        setError("人数必须为偶数，才能平均随机分到两边。");
        return;
      }

      const blueCaptain = $("blueCaptain").value;
      const redCaptain = $("redCaptain").value;

      if (!blueCaptain || !redCaptain) {
        setError("请先选择蓝红双方队长。");
        return;
      }
      if (blueCaptain === redCaptain) {
        setError("蓝红双方队长不能是同一个人。");
        return;
      }
      if (!players.includes(blueCaptain) || !players.includes(redCaptain)) {
        setError("队长必须来自当前玩家名单。");
        return;
      }

      const teamSize = players.length / 2;
      const rest = players.filter(p => p !== blueCaptain && p !== redCaptain);
      const best = buildBalancedTeams(blueCaptain, redCaptain, rest, teamSize);

      if (!best) {
        setError("平衡分组失败，请重试。");
        return;
      }

      const blueTeam = assignTeamLanes(shuffle(best.blueNames));
      const redTeam = assignTeamLanes(shuffle(best.redNames));

      $("blueTeam").innerHTML = renderTeam(blueTeam, blueCaptain, "blue");
      $("redTeam").innerHTML = renderTeam(redTeam, redCaptain, "red");

      $("blueMeta").textContent = `Blue Side · 总战力 ${best.bluePower}`;
      $("redMeta").textContent = `Red Side · 总战力 ${best.redPower}`;
      setBalanceHint(best.diff);
    }

    function clearResults() {
      $("blueTeam").innerHTML = '<div class="rounded-3xl border border-dashed border-blue-200/20 bg-blue-950/20 text-blue-100/60 text-center py-16">点击“开始分组随机”生成蓝色方结果</div>';
      $("redTeam").innerHTML = '<div class="rounded-3xl border border-dashed border-red-200/20 bg-red-950/20 text-red-100/60 text-center py-16">点击“开始分组随机”生成红色方结果</div>';
      $("blueMeta").textContent = "Blue Side";
      $("redMeta").textContent = "Red Side";
      setBalanceHint();
      setError("");
      setHelper("");
    }

    function renderPresetPool() {
      const buildPoolHtml = (tier, names) => names.map(name => {
        const safe = escapeHtml(name);
        const encodedName = encodeURIComponent(name);
        const score = tier === "ascend" ? 3 : 1;
        const cls = tier === "ascend"
          ? "border-amber-300/20 bg-amber-900/20"
          : "border-cyan-300/20 bg-cyan-900/20";
        return `
          <label class="flex items-center gap-2 rounded-xl border ${cls} px-3 py-2 text-sm cursor-pointer hover:brightness-110 transition">
            <input type="checkbox" class="preset-checkbox accent-emerald-300" data-name="${encodedName}" data-tier="${tier}">
            <span class="truncate">${safe}</span>
            <span class="ml-auto text-[11px] text-slate-300">战力 ${score}</span>
          </label>
        `;
      }).join("");

      $("ascendPool").innerHTML = buildPoolHtml("ascend", presetPlayers.ascend);
      $("generalPool").innerHTML = buildPoolHtml("general", presetPlayers.general);

      document.querySelectorAll(".preset-checkbox").forEach(el => {
        el.addEventListener("change", updateSelectedCount);
      });

      updateSelectedCount();
    }

    function getCheckedPresetNames() {
      return Array.from(document.querySelectorAll(".preset-checkbox:checked"))
        .map(el => decodeURIComponent(el.getAttribute("data-name") || ""))
        .map(x => x.trim())
        .filter(Boolean);
    }

    function updateSelectedCount() {
      const count = getCheckedPresetNames().length;
      $("selectedCount").textContent = `当前已勾选 ${count} 人`;
    }

    function addSelectedPlayers() {
      const selected = getCheckedPresetNames();
      if (!selected.length) {
        setError("请先勾选至少 1 位选手。");
        return;
      }

      const current = parsePlayers();
      const merged = [...current];
      let added = 0;

      for (const name of selected) {
        if (!merged.includes(name)) {
          merged.push(name);
          added += 1;
        }
      }

      $("playersInput").value = merged.join("\n");
      fillCaptainOptions();

      setError("");
      setHelper(added > 0
        ? `已加入 ${added} 位选手（名单总计 ${merged.length} 人）`
        : "勾选的选手都已在名单中");
    }

    function clearSelectedPlayers() {
      document.querySelectorAll(".preset-checkbox:checked").forEach(el => {
        el.checked = false;
      });
      updateSelectedCount();
      setError("");
      setHelper("已清空勾选");
    }

    $("refreshBtn").addEventListener("click", fillCaptainOptions);
    $("randomGroupBtn").addEventListener("click", randomGroup);
    $("clearBtn").addEventListener("click", clearResults);
    $("playersInput").addEventListener("input", () => {
      fillCaptainOptions();
      setHelper("");
    });

    $("addSelectedBtn").addEventListener("click", addSelectedPlayers);
    $("clearSelectedBtn").addEventListener("click", clearSelectedPlayers);

    renderPresetPool();
    fillCaptainOptions();
    clearResults();
  </script>
</body>
</html>
